<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Bar CHG">
<meta name="theme-color" content="#0f172a">
<title>Bar CIS CHG</title>
<style>
:root{--bg:#0f172a;--bg2:#1e293b;--bg3:#334155;--text:#e2e8f0;--text2:#94a3b8;--text3:#64748b;--green:#22c55e;--green2:#16a34a;--blue:#3b82f6;--blue2:#2563eb;--blue3:#60a5fa;--purple:#a855f7;--purple2:#7c3aed;--purple3:#c084fc;--yellow:#f59e0b;--yellow2:#d97706;--red:#ef4444;--red2:#dc2626;--radius:10px;--safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px)}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}body{font-family:-apple-system,'SF Pro Display',BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;min-height:100dvh;overflow:hidden}button,input,select,textarea{font-family:inherit}input,textarea,select{width:100%;padding:11px 12px;border-radius:8px;border:1px solid #475569;background:var(--bg);color:var(--text);font-size:15px;outline:none}textarea{resize:vertical}.app{display:flex;flex-direction:column;height:100vh;height:100dvh}header{background:linear-gradient(135deg,var(--bg2),var(--bg));padding:calc(var(--safe-top)+10px) 14px 10px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--bg3);flex-wrap:wrap;gap:6px}.logo{font-size:17px;font-weight:800}.caisse-tags{display:flex;gap:6px}.caisse-tag{padding:4px 10px;border-radius:7px;border:1px solid;font-weight:700;font-size:12px;background:var(--bg)}.caisse-tag.off{border-color:#16a34a88;color:var(--green)}.caisse-tag.noire{border-color:#a855f788;color:var(--purple3)}.offline-badge{padding:3px 8px;border-radius:5px;background:#dc262644;color:#fca5a5;font-size:10px;font-weight:700;display:none}.offline-badge.show{display:inline-block}nav{display:flex;background:var(--bg2);border-bottom:1px solid var(--bg3);overflow-x:auto;flex-shrink:0}nav button{flex:1;padding:10px 4px;background:none;border:none;color:var(--text2);font-size:11px;font-weight:600;cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap;min-width:50px}nav button.active{color:var(--blue3);border-bottom-color:var(--blue)}main{flex:1;overflow-y:auto;overflow-x:hidden;padding-bottom:var(--safe-bottom)}.overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:100}.modal{background:var(--bg2);border-radius:14px;width:92%;max-width:420px;border:1px solid var(--bg3);max-height:85vh;overflow-y:auto}.modal.wide{max-width:600px}.modal-header{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-bottom:1px solid var(--bg3);position:sticky;top:0;background:var(--bg2);z-index:1}.modal-header span{font-size:16px;font-weight:700}.modal-close{background:none;border:none;color:var(--text2);font-size:20px;cursor:pointer}.modal-body{padding:16px}.badge{display:inline-block;padding:4px 10px;border-radius:7px;font-weight:700;font-size:12px}.label{font-size:13px;color:var(--text2);font-weight:600;margin-bottom:4px;display:block}.hint{font-size:11px;color:var(--text3);margin-top:2px}.error{background:#dc262622;border:1px solid #dc262666;color:#fca5a5;padding:8px 12px;border-radius:8px;font-size:13px;font-weight:600;margin-top:8px}.section-title{font-size:17px;font-weight:800;color:#f1f5f9}.empty{text-align:center;color:#475569;padding:30px;font-size:14px}.btn{padding:12px 0;border-radius:var(--radius);border:none;color:#fff;font-size:15px;font-weight:700;cursor:pointer;width:100%}.btn-sm{padding:7px 13px;border-radius:6px;border:none;color:#fff;font-weight:600;font-size:12px;cursor:pointer}.btn-xs{padding:5px 9px;border-radius:5px;border:none;color:#fff;font-weight:600;font-size:11px;cursor:pointer}.filter-btn{padding:6px 11px;border-radius:6px;border:1px solid var(--bg3);background:var(--bg2);color:var(--text);font-size:12px;font-weight:600;cursor:pointer}.filter-btn.active{background:var(--blue2);border-color:var(--blue2)}.filter-btn.active-purple{background:var(--purple2);border-color:var(--purple2)}.cat-label{font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:1.5px;margin:8px 0 6px}.caisse-grid{display:flex;height:100%}.product-section{flex:1;padding:12px;overflow-y:auto}.product-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(115px,1fr));gap:6px}.product-btn{background:var(--bg2);border:1px solid var(--bg3);border-radius:var(--radius);padding:10px 6px;cursor:pointer;text-align:center;color:var(--text)}.product-btn.oos{opacity:.35}.pname{font-weight:700;font-size:13px;margin-bottom:2px}.pprice{color:var(--blue3);font-weight:800;font-size:15px}.psplit{font-size:8px;margin-top:2px;color:var(--text3)}.pstock{font-size:9px;color:var(--text3);margin-top:2px}.cart-section{width:270px;background:var(--bg2);border-left:1px solid var(--bg3);padding:12px;display:flex;flex-direction:column}.cart-title{font-size:13px;font-weight:700;margin-bottom:8px;color:var(--text2);text-transform:uppercase;letter-spacing:1px}.cart-empty{color:#475569;text-align:center;padding:20px;font-size:13px}.cart-items{flex:1;overflow-y:auto}.cart-item{display:flex;align-items:center;padding:6px 0;border-bottom:1px solid var(--bg3)}.qty-btn{width:26px;height:26px;border-radius:6px;border:none;background:var(--bg3);color:var(--text);font-size:16px;font-weight:700;cursor:pointer}.cart-total{font-size:17px;font-weight:800;padding:8px 0;border-top:2px solid var(--blue);text-align:right;color:var(--blue3)}.cart-btns{display:flex;gap:6px}.cart-btns .btn{flex:1;padding:11px 0;font-size:14px}.stock-table{border-radius:var(--radius);overflow:hidden;border:1px solid var(--bg3)}.stock-header{display:flex;padding:8px 10px;background:var(--bg3);font-weight:700;font-size:10px;color:var(--text2);text-transform:uppercase}.stock-row{display:flex;align-items:center;padding:8px 10px;border-top:1px solid var(--bg);font-size:12px}.stock-row.low{background:rgba(239,68,68,.12)}.stat-card{background:var(--bg2);border-radius:var(--radius);padding:11px 14px}.credit-card{background:var(--bg2);border-radius:var(--radius);padding:12px;border:1px solid var(--bg3)}.tx-row{display:flex;align-items:center;padding:9px 10px;background:var(--bg2);border-radius:8px;margin-bottom:4px}.closing-card{background:var(--bg2);border-radius:var(--radius);padding:12px 14px;border:1px solid var(--bg3);margin-bottom:8px}.info-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--bg3);font-size:13px}.info-row:last-child{border:none}.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:8px}.grid-auto{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:8px}.grid-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px}.flex-wrap{display:flex;flex-wrap:wrap;gap:6px}.mt-6{margin-top:6px}.mt-8{margin-top:8px}.mt-10{margin-top:10px}.mt-12{margin-top:12px}.mt-14{margin-top:14px}.mb-8{margin-bottom:8px}.mb-12{margin-bottom:12px}.mb-14{margin-bottom:14px}.p-16{padding:16px}
@media(max-width:700px){.cart-section{width:220px;padding:10px}.product-grid{grid-template-columns:repeat(auto-fill,minmax(95px,1fr))}}
</style>
</head>
<body>
<div class="app" id="app"></div>
<script src="app.js"></script>
</body>
</html>
