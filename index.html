<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Bar CHG">
<meta name="theme-color" content="#0f172a">
<title>Bar CIS Château Gombert</title>
<link rel="manifest" href="data:application/json,{%22name%22:%22Bar%20CHG%22,%22short_name%22:%22Bar%20CHG%22,%22start_url%22:%22/%22,%22display%22:%22standalone%22,%22background_color%22:%22%230f172a%22,%22theme_color%22:%22%230f172a%22,%22icons%22:[]}">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%230f172a' width='100' height='100' rx='20'/><text y='65' x='50' text-anchor='middle' font-size='50'>🍺</text></svg>">
<style>
:root {
  --bg: #0f172a; --bg2: #1e293b; --bg3: #334155;
  --text: #e2e8f0; --text2: #94a3b8; --text3: #64748b;
  --green: #22c55e; --green2: #16a34a; --blue: #3b82f6; --blue2: #2563eb; --blue3: #60a5fa;
  --purple: #a855f7; --purple2: #7c3aed; --purple3: #c084fc;
  --yellow: #f59e0b; --yellow2: #d97706; --red: #ef4444; --red2: #dc2626;
  --radius: 10px;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body { font-family: -apple-system, 'SF Pro Display', BlinkMacSystemFont, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; min-height: 100dvh; overflow: hidden; }
button, input, select, textarea { font-family: inherit; }
input, textarea, select { width: 100%; padding: 11px 12px; border-radius: 8px; border: 1px solid #475569; background: var(--bg); color: var(--text); font-size: 15px; outline: none; }
textarea { resize: vertical; }
.app { display: flex; flex-direction: column; height: 100vh; height: 100dvh; }
header { background: linear-gradient(135deg, var(--bg2), var(--bg)); padding: calc(var(--safe-top) + 10px) 14px 10px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--bg3); flex-wrap: wrap; gap: 6px; }
.logo { font-size: 17px; font-weight: 800; }
.caisse-tags { display: flex; gap: 6px; }
.caisse-tag { padding: 4px 10px; border-radius: 7px; border: 1px solid; font-weight: 700; font-size: 12px; background: var(--bg); }
.caisse-tag.off { border-color: #16a34a88; color: var(--green); }
.caisse-tag.noire { border-color: #a855f788; color: var(--purple3); }
.offline-badge { padding: 3px 8px; border-radius: 5px; background: #dc262644; color: #fca5a5; font-size: 10px; font-weight: 700; display: none; }
.offline-badge.show { display: inline-block; }
nav { display: flex; background: var(--bg2); border-bottom: 1px solid var(--bg3); overflow-x: auto; flex-shrink: 0; }
nav button { flex: 1; padding: 10px 4px; background: none; border: none; color: var(--text2); font-size: 12px; font-weight: 600; cursor: pointer; border-bottom: 3px solid transparent; white-space: nowrap; min-width: 60px; }
nav button.active { color: var(--blue3); border-bottom-color: var(--blue); }
main { flex: 1; overflow-y: auto; overflow-x: hidden; padding-bottom: var(--safe-bottom); }
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,.6); display: flex; align-items: center; justify-content: center; z-index: 100; }
.modal { background: var(--bg2); border-radius: 14px; width: 92%; max-width: 420px; border: 1px solid var(--bg3); max-height: 85vh; overflow-y: auto; }
.modal.wide { max-width: 600px; }
.modal-header { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; border-bottom: 1px solid var(--bg3); position: sticky; top: 0; background: var(--bg2); z-index: 1; }
.modal-header span { font-size: 16px; font-weight: 700; }
.modal-close { background: none; border: none; color: var(--text2); font-size: 20px; cursor: pointer; }
.modal-body { padding: 16px; }
.badge { display: inline-block; padding: 4px 10px; border-radius: 7px; font-weight: 700; font-size: 12px; }
.label { font-size: 13px; color: var(--text2); font-weight: 600; margin-bottom: 4px; display: block; }
.error { background: #dc262622; border: 1px solid #dc262666; color: #fca5a5; padding: 8px 12px; border-radius: 8px; font-size: 13px; font-weight: 600; margin-top: 8px; }
.section-title { font-size: 17px; font-weight: 800; color: #f1f5f9; }
.empty { text-align: center; color: #475569; padding: 30px; font-size: 14px; }
.btn { padding: 12px 0; border-radius: var(--radius); border: none; color: #fff; font-size: 15px; font-weight: 700; cursor: pointer; width: 100%; }
.btn-sm { padding: 7px 13px; border-radius: 6px; border: none; color: #fff; font-weight: 600; font-size: 12px; cursor: pointer; }
.btn-xs { padding: 5px 9px; border-radius: 5px; border: none; color: #fff; font-weight: 600; font-size: 11px; cursor: pointer; }
.filter-btn { padding: 6px 11px; border-radius: 6px; border: 1px solid var(--bg3); background: var(--bg2); color: var(--text); font-size: 12px; font-weight: 600; cursor: pointer; }
.filter-btn.active { background: var(--blue2); border-color: var(--blue2); }
.filter-btn.active-purple { background: var(--purple2); border-color: var(--purple2); }
.cat-label { font-size: 11px; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: 1.5px; margin: 8px 0 6px; }
.caisse-grid { display: flex; height: 100%; }
.product-section { flex: 1; padding: 12px; overflow-y: auto; }
.product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 6px; }
.product-btn { background: var(--bg2); border: 1px solid var(--bg3); border-radius: var(--radius); padding: 10px 6px; cursor: pointer; text-align: center; color: var(--text); }
.product-btn.oos { opacity: .35; }
.product-btn .pname { font-weight: 700; font-size: 13px; margin-bottom: 2px; }
.product-btn .pprice { color: var(--blue3); font-weight: 800; font-size: 15px; }
.product-btn .pcaisse { font-size: 9px; margin-top: 2px; }
.product-btn .pstock { font-size: 9px; color: var(--text3); margin-top: 2px; }
.cart-section { width: 260px; background: var(--bg2); border-left: 1px solid var(--bg3); padding: 12px; display: flex; flex-direction: column; }
.cart-title { font-size: 13px; font-weight: 700; margin-bottom: 8px; color: var(--text2); text-transform: uppercase; letter-spacing: 1px; }
.cart-empty { color: #475569; text-align: center; padding: 20px; font-size: 13px; }
.cart-items { flex: 1; overflow-y: auto; }
.cart-item { display: flex; align-items: center; padding: 6px 0; border-bottom: 1px solid var(--bg3); }
.qty-btn { width: 26px; height: 26px; border-radius: 6px; border: none; background: var(--bg3); color: var(--text); font-size: 16px; font-weight: 700; cursor: pointer; }
.cart-total { font-size: 17px; font-weight: 800; padding: 8px 0; border-top: 2px solid var(--blue); text-align: right; color: var(--blue3); }
.cart-btns { display: flex; gap: 6px; }
.cart-btns .btn { flex: 1; padding: 11px 0; font-size: 14px; }
.stock-table { border-radius: var(--radius); overflow: hidden; border: 1px solid var(--bg3); }
.stock-header { display: flex; padding: 8px 10px; background: var(--bg3); font-weight: 700; font-size: 11px; color: var(--text2); text-transform: uppercase; }
.stock-row { display: flex; align-items: center; padding: 8px 10px; border-top: 1px solid var(--bg); font-size: 12px; }
.stock-row.low { background: rgba(239,68,68,.12); }
.stat-card { background: var(--bg2); border-radius: var(--radius); padding: 11px 14px; }
.credit-card { background: var(--bg2); border-radius: var(--radius); padding: 12px; border: 1px solid var(--bg3); }
.tx-row { display: flex; align-items: center; padding: 9px 10px; background: var(--bg2); border-radius: 8px; margin-bottom: 4px; }
.closing-card { background: var(--bg2); border-radius: var(--radius); padding: 12px 14px; border: 1px solid var(--bg3); margin-bottom: 8px; }
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.grid-auto { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 8px; }
.grid-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 10px; }
.flex-wrap { display: flex; flex-wrap: wrap; gap: 6px; }
.mt-8{margin-top:8px}.mt-10{margin-top:10px}.mt-12{margin-top:12px}.mt-14{margin-top:14px}
.mb-8{margin-bottom:8px}.mb-12{margin-bottom:12px}.mb-14{margin-bottom:14px}
.p-16{padding:16px}
@media(max-width:700px){.cart-section{width:220px;padding:10px}.product-grid{grid-template-columns:repeat(auto-fill,minmax(95px,1fr))}}
</style>
</head>
<body>
<div class="app" id="app"></div>
<script>
// ═══════ SERVICE WORKER REGISTRATION ═══════
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}
window.addEventListener('online',()=>{document.querySelector('.offline-badge')?.classList.remove('show')});
window.addEventListener('offline',()=>{document.querySelector('.offline-badge')?.classList.add('show')});

// ═══════ Storage ═══════
const LS={
  get(k,fb){try{const v=localStorage.getItem('barchg_'+k);return v?JSON.parse(v):fb}catch{return fb}},
  set(k,v){try{localStorage.setItem('barchg_'+k,JSON.stringify(v))}catch(e){console.error(e)}}
};

// ═══════ State ═══════
const DEFAULT_PRODUCTS=[
  {id:'1',name:'Bière pression',price:1.5,stock:48,category:'Boissons',caisse:'officielle'},
  {id:'2',name:'Coca-Cola',price:1,stock:36,category:'Boissons',caisse:'officielle'},
  {id:'3',name:'Café',price:.5,stock:100,category:'Boissons',caisse:'officielle'},
  {id:'4',name:'Eau',price:.5,stock:48,category:'Boissons',caisse:'officielle'},
  {id:'5',name:'Chips',price:1,stock:20,category:'Snacks',caisse:'officielle'},
  {id:'6',name:'Bonbons',price:.5,stock:30,category:'Confiserie',caisse:'noire'},
  {id:'7',name:'Barre chocolat',price:1,stock:15,category:'Confiserie',caisse:'noire'},
  {id:'8',name:'Sucette',price:.3,stock:25,category:'Confiserie',caisse:'noire'},
];

let state={
  tab:'Caisse',products:LS.get('products',DEFAULT_PRODUCTS),transactions:LS.get('tx',[]),
  credits:LS.get('credits',[]),caisseOff:LS.get('caisseOff',0),caisseNoire:LS.get('caisseNoire',0),
  closings:LS.get('closings',[]),cart:[],modal:null,filterMode:'all',filterPeriod:'all',
  selectedDay:'',selectedMonth:'',creditName:'',closerName:'',closerPassword:'',formError:'',
  payAmount:'',selectedCredit:null,prodForm:{name:'',price:'',stock:'',category:'Boissons',caisse:'officielle'},
  editProductId:null,actionClosing:null,actionPassword:'',actionError:'',actionNote:'',viewClosing:null
};

function persist(){LS.set('products',state.products);LS.set('tx',state.transactions);LS.set('credits',state.credits);LS.set('caisseOff',state.caisseOff);LS.set('caisseNoire',state.caisseNoire);LS.set('closings',state.closings)}
function update(c){Object.assign(state,c);persist();render()}

// ═══════ Helpers ═══════
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7)}
function fmt(n){return Number(n).toFixed(2).replace('.',',')+' €'}
function dateStr(ts){const d=new Date(ts);return d.toLocaleDateString('fr-FR')+' '+d.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})}
function dayKey(ts){return new Date(ts).toLocaleDateString('fr-FR')}
function monthKey(ts){const d=new Date(ts);return String(d.getMonth()+1).padStart(2,'0')+'/'+d.getFullYear()}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function simpleHash(str){let h=0;for(let i=0;i<str.length;i++){h=((h<<5)-h)+str.charCodeAt(i);h=h&h}return h.toString(36)}
function uniq(arr){return[...new Set(arr)]}

const TABS=[{id:'Caisse',icon:'🛒'},{id:'Ardoises',icon:'📋'},{id:'Stock',icon:'📦'},{id:'Historique',icon:'📜'},{id:'Compta',icon:'📊'},{id:'Clôture',icon:'🔒'}];

function modalHTML(title,body,wide){
  return`<div class="overlay" onclick="if(event.target===this)update({modal:null,formError:'',actionClosing:null,actionError:'',viewClosing:null})"><div class="modal ${wide?'wide':''}"><div class="modal-header"><span>${esc(title)}</span><button class="modal-close" onclick="update({modal:null,formError:'',actionClosing:null,actionError:'',viewClosing:null})">✕</button></div><div class="modal-body">${body}</div></div></div>`;
}

// ═══════ CAISSE ═══════
function renderCaisse(){
  const cats=uniq(state.products.map(p=>p.category));
  const cOff=state.cart.filter(c=>c.caisse==='officielle').reduce((s,c)=>s+c.price*c.qty,0);
  const cNoire=state.cart.filter(c=>c.caisse==='noire').reduce((s,c)=>s+c.price*c.qty,0);
  const cTotal=cOff+cNoire;
  let pH='';
  cats.forEach(cat=>{
    pH+=`<div class="cat-label">${esc(cat)}</div><div class="product-grid">`;
    state.products.filter(p=>p.category===cat).forEach(p=>{
      const bc=p.caisse==='noire'?'var(--purple)':'var(--green)';
      const cc=p.caisse==='noire'?'var(--purple3)':'#86efac';
      pH+=`<button class="product-btn ${p.stock<=0?'oos':''}" style="border-left:4px solid ${bc}" onclick="addToCart('${p.id}')" ${p.stock<=0?'disabled':''}><div class="pname">${esc(p.name)}</div><div class="pprice">${fmt(p.price)}</div><div class="pcaisse" style="color:${cc}">${p.caisse==='noire'?'● Noire':'● Officielle'}</div><div class="pstock">Stock: ${p.stock}</div></button>`;
    });
    pH+='</div>';
  });
  let cartH='';
  if(!state.cart.length)cartH='<div class="cart-empty">Aucun article</div>';
  else state.cart.forEach(c=>{
    const dot=c.caisse==='noire'?'var(--purple3)':'#86efac';
    cartH+=`<div class="cart-item"><div style="flex:1"><div style="font-weight:600;font-size:13px">${esc(c.name)} <span style="font-size:9px;color:${dot}">●</span></div><div style="font-size:11px;color:var(--text2)">${fmt(c.price)} × ${c.qty}</div></div><div style="font-weight:700;margin-right:6px;font-size:13px">${fmt(c.price*c.qty)}</div><div style="display:flex;gap:3px"><button class="qty-btn" onclick="removeFromCart('${c.id}')">−</button><button class="qty-btn" onclick="addToCart('${c.id}')">+</button></div></div>`;
  });
  let split='';
  if(state.cart.length){
    split='<div style="border-top:1px solid var(--bg3);padding-top:6px;margin-bottom:4px">';
    if(cOff>0)split+=`<div style="font-size:12px;display:flex;justify-content:space-between;color:#86efac"><span>Officielle</span><span>${fmt(cOff)}</span></div>`;
    if(cNoire>0)split+=`<div style="font-size:12px;display:flex;justify-content:space-between;color:var(--purple3)"><span>Noire</span><span>${fmt(cNoire)}</span></div>`;
    split+='</div>';
  }
  return`<div class="caisse-grid"><div class="product-section">${pH}</div><div class="cart-section"><div class="cart-title">Panier</div><div class="cart-items">${cartH}</div>${split}<div class="cart-total">Total : ${fmt(cTotal)}</div><div class="cart-btns"><button class="btn" style="background:var(--green2)" onclick="doCheckout('cash')" ${!state.cart.length?'disabled':''}>💰 Encaisser</button><button class="btn" style="background:var(--yellow2)" onclick="update({modal:'credit'})" ${!state.cart.length?'disabled':''}>📋 Ardoise</button></div></div></div>`;
}

window.addToCart=function(id){const p=state.products.find(x=>x.id===id);if(!p||p.stock<=0)return;const ex=state.cart.find(c=>c.id===id);if(ex){if(ex.qty>=p.stock)return;state.cart=state.cart.map(c=>c.id===id?{...c,qty:c.qty+1}:c)}else state.cart=[...state.cart,{...p,qty:1}];render()};
window.removeFromCart=function(id){state.cart=state.cart.map(c=>c.id===id?{...c,qty:c.qty-1}:c).filter(c=>c.qty>0);render()};
window.doCheckout=function(mode,name){
  if(!state.cart.length)return;
  const cOff=state.cart.filter(c=>c.caisse==='officielle').reduce((s,c)=>s+c.price*c.qty,0);
  const cNoire=state.cart.filter(c=>c.caisse==='noire').reduce((s,c)=>s+c.price*c.qty,0);
  const cTotal=cOff+cNoire;
  const tx={id:uid(),items:state.cart.map(c=>({name:c.name,qty:c.qty,price:c.price,caisse:c.caisse})),total:cTotal,totalOff:cOff,totalNoire:cNoire,date:Date.now(),mode,creditName:name||null};
  state.products=state.products.map(p=>{const ic=state.cart.find(c=>c.id===p.id);return ic?{...p,stock:Math.max(0,p.stock-ic.qty)}:p});
  if(mode==='cash'){state.caisseOff+=cOff;state.caisseNoire+=cNoire}
  state.transactions=[tx,...state.transactions];
  if(mode==='credit'){
    const entry={date:Date.now(),amount:cTotal,amountOff:cOff,amountNoire:cNoire,items:state.cart.map(c=>c.name+' x'+c.qty).join(', ')};
    const ex=state.credits.find(c=>c.name.toLowerCase()===name.toLowerCase());
    if(ex)state.credits=state.credits.map(c=>c.name.toLowerCase()===name.toLowerCase()?{...c,amount:c.amount+cTotal,amountOff:(c.amountOff||0)+cOff,amountNoire:(c.amountNoire||0)+cNoire,history:[...(c.history||[]),entry]}:c);
    else state.credits=[...state.credits,{id:uid(),name,amount:cTotal,amountOff:cOff,amountNoire:cNoire,history:[entry]}];
  }
  state.cart=[];update({modal:null,creditName:''});
};
window.confirmCredit=function(){const n=state.creditName.trim();if(!n)return;doCheckout('credit',n)};

// ═══════ ARDOISES ═══════
function renderArdoises(){
  const total=state.credits.reduce((s,c)=>s+c.amount,0);
  let cards='';
  if(!state.credits.length)cards='<div class="empty">Aucune ardoise en cours 🎉</div>';
  else state.credits.forEach(c=>{
    let hist='';
    if(c.history&&c.history.length){hist='<div style="margin-top:6px;max-height:80px;overflow-y:auto">';c.history.slice(-5).forEach(h=>{hist+=`<div style="font-size:10px;color:var(--text2);border-top:1px solid var(--bg3);padding-top:2px;margin-top:2px">${dateStr(h.date)} — ${h.amount>0?'+':''}${fmt(h.amount)} — ${esc(h.items)}</div>`});hist+='</div>'}
    cards+=`<div class="credit-card"><div style="display:flex;justify-content:space-between;align-items:center"><div style="font-size:17px;font-weight:700">${esc(c.name)}</div><div style="font-size:19px;font-weight:800;color:var(--red)">${fmt(c.amount)}</div></div><div style="font-size:11px;color:var(--text3);margin-top:3px">Off: ${fmt(c.amountOff||0)} · Noire: ${fmt(c.amountNoire||0)}</div>${hist}<button class="btn-sm mt-8" style="background:var(--green2)" onclick="state.selectedCredit=state.credits.find(x=>x.id==='${c.id}');state.payAmount='';update({modal:'payCredit'})">Encaisser</button></div>`;
  });
  return`<div class="p-16"><div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px" class="mb-14"><h2 class="section-title">Ardoises en cours</h2><span class="badge" style="background:#ef444422;border:1px solid #ef444455;color:var(--red)">Total dû : ${fmt(total)}</span></div><div class="grid-cards">${cards}</div></div>`;
}

window.payOffCredit=function(){
  const c=state.selectedCredit;if(!c)return;
  const amount=state.payAmount?parseFloat(state.payAmount.replace(',','.')):c.amount;
  if(isNaN(amount)||amount<=0)return;
  const actual=Math.min(amount,c.amount);const ratio=c.amount>0?actual/c.amount:1;
  const pOff=(c.amountOff||0)*ratio;const pNoire=(c.amountNoire||0)*ratio;
  state.credits=state.credits.map(x=>x.id===c.id?{...x,amount:x.amount-actual,amountOff:(x.amountOff||0)-pOff,amountNoire:(x.amountNoire||0)-pNoire,history:[...(x.history||[]),{date:Date.now(),amount:-actual,items:'Remboursement'}]}:x).filter(x=>x.amount>0.005);
  state.caisseOff+=pOff;state.caisseNoire+=pNoire;
  state.transactions=[{id:uid(),items:[{name:`Remboursement ${c.name}`,qty:1,price:actual,caisse:'mixte'}],total:actual,totalOff:pOff,totalNoire:pNoire,date:Date.now(),mode:'remboursement'},...state.transactions];
  update({modal:null,selectedCredit:null,payAmount:''});
};

// ═══════ STOCK ═══════
function renderStock(){
  const cats=uniq(state.products.map(p=>p.category));
  let html='';
  cats.forEach(cat=>{
    html+=`<div class="cat-label">${esc(cat)}</div><div class="stock-table"><div class="stock-header"><span style="flex:2">Produit</span><span style="flex:1;text-align:center">Prix</span><span style="flex:1;text-align:center">Caisse</span><span style="flex:1;text-align:center">Stock</span><span style="flex:2;text-align:center">Actions</span></div>`;
    state.products.filter(p=>p.category===cat).forEach(p=>{
      const cc=p.caisse==='noire'?'var(--purple3)':'#86efac';
      html+=`<div class="stock-row ${p.stock<=5?'low':''}"><span style="flex:2;font-weight:600">${esc(p.name)} ${p.stock<=5?'⚠️':''}</span><span style="flex:1;text-align:center">${fmt(p.price)}</span><span style="flex:1;text-align:center;font-size:11px;color:${cc}">${p.caisse==='noire'?'Noire':'Off.'}</span><span style="flex:1;text-align:center;font-weight:700;color:${p.stock<=5?'var(--red)':'var(--green)'}">${p.stock}</span><span style="flex:2;display:flex;gap:3px;justify-content:center;flex-wrap:wrap"><button class="btn-xs" style="background:var(--blue2)" onclick="restockProduct('${p.id}',6)">+6</button><button class="btn-xs" style="background:var(--blue2)" onclick="restockProduct('${p.id}',24)">+24</button><button class="btn-xs" style="background:#6b7280" onclick="editProduct('${p.id}')">✏️</button><button class="btn-xs" style="background:var(--red2)" onclick="deleteProduct('${p.id}')">🗑</button></span></div>`;
    });

  });

}
window.restockProduct=function(id,qty){state.products=state.products.map(p=>p.id===id?{...p,stock:p.stock+qty}:p);update({})};
window.deleteProduct=function(id){state.products=state.products.filter(p=>p.id!==id);update({})};
window.editProduct=function(id){const p=state.products.find(x=>x.id===id);state.editProductId=id;state.prodForm={name:p.name,price:p.price+'',stock:p.stock+'',category:p.category,caisse:p.caisse||'officielle'};update({modal:'prodForm'})};
window.saveProduct=function(){const f=state.prodForm;const p={name:f.name.trim(),price:parseFloat(f.price.toString().replace(',','.')),stock:parseInt(f.stock),category:f.category.trim()||'Boissons',caisse:f.caisse};if(!p.name||isNaN(p.price)||isNaN(p.stock))return;if(state.editProductId)state.products=state.products.map(pr=>pr.id===state.editProductId?{...pr,...p}:pr);else state.products=[...state.products,{...p,id:uid()}];state.editProductId=null;update({modal:null})};
window.setProdField=function(k,v){state.prodForm[k]=v;if(k==='caisse')render()};

// ═══════ HISTORIQUE ═══════
function renderHistorique(){
  let filtered=state.transactions;
  if(state.filterMode!=='all')filtered=filtered.filter(t=>t.mode===state.filterMode);
  if(state.filterPeriod==='today')filtered=filtered.filter(t=>dayKey(t.date)===dayKey(Date.now()));
  if(state.filterPeriod==='day'&&state.selectedDay)filtered=filtered.filter(t=>dayKey(t.date)===state.selectedDay);
  if(state.filterPeriod==='month'&&state.selectedMonth)filtered=filtered.filter(t=>monthKey(t.date)===state.selectedMonth);
  const fOff=filtered.reduce((s,t)=>s+((t.mode==='cash'||t.mode==='remboursement')?(t.totalOff||0):0),0);
  const fNoire=filtered.reduce((s,t)=>s+((t.mode==='cash'||t.mode==='remboursement')?(t.totalNoire||0):0),0);
  const fCredit=filtered.reduce((s,t)=>s+(t.mode==='credit'?t.total:0),0);
  const allDays=uniq(state.transactions.map(t=>dayKey(t.date)));
  const allMonths=uniq(state.transactions.map(t=>monthKey(t.date)));
  let pSel='';
  if(state.filterPeriod==='day')pSel=`<select style="padding:6px 10px;font-size:12px;width:auto" onchange="update({selectedDay:this.value})"><option value="">Jour...</option>${allDays.map(d=>`<option value="${d}" ${state.selectedDay===d?'selected':''}>${d}</option>`).join('')}</select>`;
  if(state.filterPeriod==='month')pSel=`<select style="padding:6px 10px;font-size:12px;width:auto" onchange="update({selectedMonth:this.value})"><option value="">Mois...</option>${allMonths.map(m=>`<option value="${m}" ${state.selectedMonth===m?'selected':''}>${m}</option>`).join('')}</select>`;
  let txH='';
  if(!filtered.length)txH='<div class="empty">Aucune transaction</div>';
  else filtered.forEach(tx=>{
    const label=tx.mode==='cash'?'💰 Cash':tx.mode==='credit'?`📋 ${esc(tx.creditName)}`:'🔄 Remb.';
    txH+=`<div class="tx-row"><div style="flex:1;min-width:0"><div style="font-weight:600;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${tx.items.map(i=>esc(i.name)+' ×'+i.qty).join(', ')}</div><div style="font-size:10px;color:var(--text2)">${dateStr(tx.date)} — ${label}</div></div><div style="display:flex;flex-direction:column;align-items:flex-end;margin-right:6px"><div style="font-weight:700;font-size:14px">${fmt(tx.total)}</div><div style="font-size:9px;color:var(--text3)">Off ${fmt(tx.totalOff||0)} · N ${fmt(tx.totalNoire||0)}</div></div><button class="btn-xs" style="background:var(--red2)" onclick="cancelTx('${tx.id}')">✕</button></div>`;
  });
  return`<div class="p-16"><div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px" class="mb-12"><h2 class="section-title">Historique</h2><button class="btn-sm" style="background:var(--blue2)" onclick="update({modal:'export'})">📥 Exporter</button></div><div class="flex-wrap mb-8">${[['all','Tout'],['cash','💰 Cash'],['credit','📋 Ardoise'],['remboursement','🔄 Remb.']].map(([v,l])=>`<button class="filter-btn ${state.filterMode===v?'active':''}" onclick="update({filterMode:'${v}'})">${l}</button>`).join('')}</div><div class="flex-wrap mb-12" style="align-items:center">${[['all','Tout'],['today',"Aujourd'hui"],['day','Par jour'],['month','Par mois']].map(([v,l])=>`<button class="filter-btn ${state.filterPeriod===v?'active-purple':''}" onclick="update({filterPeriod:'${v}'})">${l}</button>`).join('')}${pSel}</div><div class="flex-wrap mb-14"><span class="badge" style="background:#22c55e22;border:1px solid #22c55e55;color:var(--green)">Off: ${fmt(fOff)}</span><span class="badge" style="background:#a855f722;border:1px solid #a855f755;color:var(--purple)">Noire: ${fmt(fNoire)}</span><span class="badge" style="background:#f59e0b22;border:1px solid #f59e0b55;color:var(--yellow)">Ardoise: ${fmt(fCredit)}</span><span class="badge" style="background:#94a3b822;border:1px solid #94a3b855;color:var(--text2)">${filtered.length} ops</span></div><div style="max-height:55vh;overflow-y:auto">${txH}</div></div>`;
}
window.cancelTx=function(id){const tx=state.transactions.find(t=>t.id===id);if(!tx)return;if(tx.mode==='cash'){state.caisseOff-=(tx.totalOff||0);state.caisseNoire-=(tx.totalNoire||0)}tx.items.forEach(item=>{const p=state.products.find(pr=>pr.name===item.name);if(p)p.stock+=item.qty});state.transactions=state.transactions.filter(t=>t.id!==id);update({})};

function getExportCSV(){
  let f=state.transactions;
  if(state.filterMode!=='all')f=f.filter(t=>t.mode===state.filterMode);
  if(state.filterPeriod==='today')f=f.filter(t=>dayKey(t.date)===dayKey(Date.now()));
  if(state.filterPeriod==='day'&&state.selectedDay)f=f.filter(t=>dayKey(t.date)===state.selectedDay);
  if(state.filterPeriod==='month'&&state.selectedMonth)f=f.filter(t=>monthKey(t.date)===state.selectedMonth);
  const rows=[['Date','Mode','Articles','Total','Officielle','Noire'].join(';')];
  f.forEach(tx=>rows.push([dateStr(tx.date),tx.mode,tx.items.map(i=>i.name+' x'+i.qty).join(' + '),tx.total.toFixed(2),(tx.totalOff||0).toFixed(2),(tx.totalNoire||0).toFixed(2)].join(';')));
  return rows.join('\n');
}

// ═══════ COMPTA ═══════
function renderCompta(){
  const today=dayKey(Date.now());const tTx=state.transactions.filter(t=>dayKey(t.date)===today);
  const tCOff=tTx.reduce((s,t)=>s+(t.mode==='cash'?(t.totalOff||0):0),0);
  const tCNoire=tTx.reduce((s,t)=>s+(t.mode==='cash'?(t.totalNoire||0):0),0);
  const tCredit=tTx.reduce((s,t)=>s+(t.mode==='credit'?t.total:0),0);
  const totalCredit=state.credits.reduce((s,c)=>s+c.amount,0);
  const aOff=state.transactions.reduce((s,t)=>s+((t.mode==='cash'||t.mode==='remboursement')?(t.totalOff||0):0),0);
  const aNoire=state.transactions.reduce((s,t)=>s+((t.mode==='cash'||t.mode==='remboursement')?(t.totalNoire||0):0),0);
  const prodMap={};state.transactions.forEach(tx=>tx.items.forEach(i=>{if(i.name.startsWith('Remboursement'))return;prodMap[i.name]=(prodMap[i.name]||0)+i.qty}));
  const top=Object.entries(prodMap).sort((a,b)=>b[1]-a[1]).slice(0,8);
  const stats=[['Caisse officielle',fmt(state.caisseOff),'var(--green)'],['Caisse noire',fmt(state.caisseNoire),'var(--purple)'],['Ventes jour (off.)',fmt(tCOff),'var(--blue)'],['Ventes jour (noire)',fmt(tCNoire),'#8b5cf6'],['Ardoises du jour',fmt(tCredit),'var(--yellow)'],['Total ardoises dues',fmt(totalCredit),'var(--red)'],['CA total officiel',fmt(aOff),'#059669'],['CA total noire',fmt(aNoire),'var(--purple2)']];
  let topH='';if(!top.length)topH='<div class="empty">Pas encore de données</div>';
  else top.forEach(([name,qty],i)=>{topH+=`<div style="display:flex;align-items:center;gap:10px;padding:7px 12px;background:var(--bg2);border-radius:8px"><div style="width:24px;height:24px;border-radius:50%;background:${i<3?'var(--yellow)':'var(--bg3)'};display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;color:${i<3?'#000':'var(--text)'}">${i+1}</div><span style="flex:1;font-weight:600;font-size:13px">${esc(name)}</span><span style="font-weight:700;color:var(--blue3);font-size:13px">${qty}</span></div>`});
  return`<div class="p-16"><h2 class="section-title">Comptabilité</h2><div class="grid-auto" style="margin:12px 0 18px">${stats.map(([l,v,c])=>`<div class="stat-card" style="border-left:4px solid ${c}"><div style="font-size:11px;color:var(--text2)">${l}</div><div style="font-size:20px;font-weight:800;color:${c}">${v}</div></div>`).join('')}</div><h3 class="section-title" style="font-size:14px;margin-bottom:8px">Top produits</h3><div style="display:flex;flex-direction:column;gap:4px">${topH}</div></div>`;
}

// ═══════ CLÔTURE ═══════
function renderCloture(){
  const today=dayKey(Date.now());const tTx=state.transactions.filter(t=>dayKey(t.date)===today);
  const tCOff=tTx.reduce((s,t)=>s+(t.mode==='cash'?(t.totalOff||0):0),0);
  const tCNoire=tTx.reduce((s,t)=>s+(t.mode==='cash'?(t.totalNoire||0):0),0);
  const tCredit=tTx.reduce((s,t)=>s+(t.mode==='credit'?t.total:0),0);
  const tNb=tTx.length;const lowStock=state.products.filter(p=>p.stock<=5);
  let clH='';if(!state.closings.length)clH='<div class="empty">Aucune clôture effectuée</div>';
  else state.closings.forEach(cl=>{
    let notes='';if(cl.notes&&cl.notes.length)cl.notes.forEach(n=>{notes+=`<div style="font-size:10px;color:var(--yellow);margin-top:2px">📝 ${dateStr(n.date)} — ${esc(n.text)}</div>`});
    clH+=`<div class="closing-card"><div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:6px"><div><div style="font-weight:700;font-size:14px">📅 ${cl.day}</div><div style="font-size:11px;color:var(--text2)">Off: ${fmt(cl.cashOff)} · Noire: ${fmt(cl.cashNoire)} · Ardoise: ${fmt(cl.creditTotal)} · ${cl.nbTransactions} tx</div><div style="font-size:11px;color:var(--blue3);margin-top:2px">🔒 Clôturée par <b>${esc(cl.closedBy)}</b></div>${notes}</div><div class="flex-wrap"><button class="btn-sm" style="background:var(--bg3)" onclick="viewClosingDetail('${cl.id}')">Voir</button><button class="btn-sm" style="background:var(--blue2)" onclick="copyClosing('${cl.id}')">Copier</button><button class="btn-sm" style="background:var(--yellow2)" onclick="startAction('${cl.id}','addNote')">📝</button><button class="btn-sm" style="background:var(--red2)" onclick="startAction('${cl.id}','delete')">🗑</button></div></div></div>`;
  });
  return`<div class="p-16"><h2 class="section-title">Clôture de journée</h2><div style="background:var(--bg2);border-radius:12px;padding:14px;margin:12px 0;border:1px solid var(--bg3)"><div style="font-size:14px;font-weight:700;margin-bottom:10px;color:var(--text2)">📅 Résumé du jour — ${today}</div><div class="grid-2"><div><span style="color:var(--text2);font-size:12px">Cash officielle</span><div style="font-size:19px;font-weight:800;color:var(--green)">${fmt(tCOff)}</div></div><div><span style="color:var(--text2);font-size:12px">Cash noire</span><div style="font-size:19px;font-weight:800;color:var(--purple3)">${fmt(tCNoire)}</div></div><div><span style="color:var(--text2);font-size:12px">Ardoises</span><div style="font-size:19px;font-weight:800;color:var(--yellow)">${fmt(tCredit)}</div></div><div><span style="color:var(--text2);font-size:12px">Transactions</span><div style="font-size:19px;font-weight:800;color:var(--blue3)">${tNb}</div></div></div><div class="grid-2 mt-10" style="padding-top:10px;border-top:1px solid var(--bg3)"><div><span style="color:var(--text2);font-size:12px">Solde officielle</span><div style="font-size:17px;font-weight:800;color:var(--green)">${fmt(state.caisseOff)}</div></div><div><span style="color:var(--text2);font-size:12px">Solde noire</span><div style="font-size:17px;font-weight:800;color:var(--purple3)">${fmt(state.caisseNoire)}</div></div></div>${lowStock.length?`<div class="mt-10" style="padding-top:8px;border-top:1px solid var(--bg3)"><div style="font-size:12px;color:var(--red);font-weight:700;margin-bottom:3px">⚠️ Stocks bas</div><div style="font-size:12px;color:#fca5a5">${lowStock.map(p=>esc(p.name)+' ('+p.stock+')').join(' · ')}</div></div>`:''}<button class="btn mt-12" style="background:var(--red2)" onclick="update({modal:'closeConfirm',formError:'',closerName:'',closerPassword:''})">🔒 Clôturer la journée</button></div><h3 class="section-title mt-14" style="font-size:14px;margin-bottom:8px">Historique des clôtures</h3>${clH}</div>`;
}

function exportClosingText(cl){
  let l=[`CLÔTURE DU ${cl.day}`,`Clôturée par : ${cl.closedBy}`,'═══════════════════════════════════','','CAISSES',`  Officielle : ${fmt(cl.caisseOff)}`,`  Noire      : ${fmt(cl.caisseNoire)}`,'','RECETTES DU JOUR',`  Cash officielle : ${fmt(cl.cashOff)}`,`  Cash noire      : ${fmt(cl.cashNoire)}`,`  Ardoises         : ${fmt(cl.creditTotal)}`,`  Nb transactions  : ${cl.nbTransactions}`,'','ÉTAT DU STOCK'];
  cl.stockSnapshot.forEach(s=>l.push(`  ${s.name.padEnd(22)} ${String(s.stock).padStart(4)}  (${s.caisse})`));
  l.push('','ARDOISES EN COURS');
  if(cl.creditSnapshot.length)cl.creditSnapshot.forEach(c=>l.push(`  ${c.name.padEnd(22)} ${fmt(c.amount)}`));else l.push('  Aucune');
  if(cl.notes&&cl.notes.length){l.push('','NOTES');cl.notes.forEach(n=>l.push(`  ${dateStr(n.date)} — ${n.text}`));}
  return l.join('\n');
}

window.doCloseDay=function(){
  if(!state.closerName.trim()){state.formError='Entre ton nom';render();return}
  if(!state.closerPassword.trim()){state.formError='Choisis un mot de passe';render();return}
  if(state.closerPassword.trim().length<4){state.formError='Min. 4 caractères';render();return}
  const today=dayKey(Date.now());const tTx=state.transactions.filter(t=>dayKey(t.date)===today);
  const closing={id:uid(),date:Date.now(),day:today,closedBy:state.closerName.trim(),passwordHash:simpleHash(state.closerPassword.trim()),caisseOff:state.caisseOff,caisseNoire:state.caisseNoire,cashOff:tTx.reduce((s,t)=>s+(t.mode==='cash'?(t.totalOff||0):0),0),cashNoire:tTx.reduce((s,t)=>s+(t.mode==='cash'?(t.totalNoire||0):0),0),creditTotal:tTx.reduce((s,t)=>s+(t.mode==='credit'?t.total:0),0),nbTransactions:tTx.length,stockSnapshot:state.products.map(p=>({name:p.name,stock:p.stock,caisse:p.caisse})),creditSnapshot:state.credits.map(c=>({name:c.name,amount:c.amount})),notes:[]};
  state.closings=[closing,...state.closings];update({modal:null,closerName:'',closerPassword:'',formError:''});
};
window.viewClosingDetail=function(id){state.viewClosing=state.closings.find(c=>c.id===id);update({modal:'viewClosing'})};
window.copyClosing=function(id){const cl=state.closings.find(c=>c.id===id);if(cl)navigator.clipboard?.writeText(exportClosingText(cl))};
window.startAction=function(id,action){state.actionClosing={closing:state.closings.find(c=>c.id===id),action};state.actionPassword='';state.actionError='';state.actionNote='';update({modal:'closingAction'})};
window.doClosingAction=function(){
  const ac=state.actionClosing;if(!ac)return;
  if(simpleHash(state.actionPassword.trim())!==ac.closing.passwordHash){state.actionError='Mot de passe incorrect';render();return}
  if(ac.action==='delete')state.closings=state.closings.filter(c=>c.id!==ac.closing.id);
  else if(ac.action==='addNote'){if(!state.actionNote.trim()){state.actionError='Écris une note';render();return}state.closings=state.closings.map(c=>c.id===ac.closing.id?{...c,notes:[...(c.notes||[]),{date:Date.now(),text:state.actionNote.trim()}]}:c)}
  update({modal:null,actionClosing:null,actionPassword:'',actionError:'',actionNote:''});
};

  if(state.modal==='export')return modalHTML('Exporter',`<p style="color:var(--text2);font-size:12px;margin-bottom:8px">CSV point-virgule — collable dans Excel</p><textarea style="height:200px;font-family:monospace;font-size:11px" readonly onclick="this.select()">${esc(getExportCSV())}</textarea><button class="btn mt-10" style="background:var(--blue2)" onclick="navigator.clipboard?.writeText(document.querySelector('.modal textarea').value)">📋 Copier</button>`,true);
  if(state.modal==='closeConfirm')return modalHTML('Clôturer la journée',`<p style="color:#d1d5db;margin-bottom:12px;line-height:1.5;font-size:13px">Tu vas signer cette clôture. Personne ne pourra la modifier sans ton mot de passe.</p><div style="display:flex;flex-direction:column;gap:10px"><div><label class="label">Ton nom</label><input placeholder="Prénom Nom" value="${esc(state.closerName)}" oninput="state.closerName=this.value;state.formError='';var e=document.querySelector('.error');if(e)e.remove()"></div><div><label class="label">Mot de passe</label><input type="password" placeholder="Min. 4 caractères" value="${esc(state.closerPassword)}" oninput="state.closerPassword=this.value;state.formError='';var e=document.querySelector('.error');if(e)e.remove()"></div>${state.formError?`<div class="error">${esc(state.formError)}</div>`:''}<button class="btn" style="background:var(--red2)" onclick="doCloseDay()">🔒 Confirmer et signer</button></div>`);
  if(state.modal==='viewClosing'&&state.viewClosing)return modalHTML(`Clôture du ${state.viewClosing.day}`,`<textarea style="height:280px;font-family:monospace;font-size:11px;white-space:pre" readonly onclick="this.select()">${esc(exportClosingText(state.viewClosing))}</textarea><button class="btn mt-10" style="background:var(--blue2)" onclick="navigator.clipboard?.writeText(document.querySelector('.modal textarea').value)">📋 Copier</button>`,true);
  if(state.modal==='closingAction'&&state.actionClosing){const ac=state.actionClosing;return modalHTML(ac.action==='delete'?`Supprimer clôture`:`Ajouter une note`,`<div style="background:var(--bg);border-radius:8px;padding:10px;margin-bottom:12px;border:1px solid var(--bg3)"><div style="font-size:12px;color:var(--text2)">Clôture signée par</div><div style="font-size:15px;font-weight:700;color:var(--blue3)">🔒 ${esc(ac.closing.closedBy)}</div><div style="font-size:11px;color:var(--text3);margin-top:3px">Seule cette personne peut modifier cette clôture.</div></div>${ac.action==='addNote'?`<div class="mb-8"><label class="label">Note</label><textarea style="height:60px" placeholder="Ex: Manquait 2€..." oninput="state.actionNote=this.value;state.actionError='';var e=document.querySelector('.error');if(e)e.remove()">${esc(state.actionNote)}</textarea></div>`:''}<div><label class="label">Mot de passe de ${esc(ac.closing.closedBy)}</label><input type="password" placeholder="Mot de passe" value="${esc(state.actionPassword)}" oninput="state.actionPassword=this.value;state.actionError='';var e=document.querySelector('.error');if(e)e.remove()"></div>${state.actionError?`<div class="error">${esc(state.actionError)}</div>`:''}<button class="btn mt-10" style="background:${ac.action==='delete'?'var(--red2)':'var(--yellow2)'}" onclick="doClosingAction()">${ac.action==='delete'?'🗑 Supprimer':'📝 Ajouter la note'}</button>`)}
  return'';
}

// ═══════ RENDER ═══════
function render(){
  const tabs={Caisse:renderCaisse,Ardoises:renderArdoises,Stock:renderStock,Historique:renderHistorique,Compta:renderCompta,'Clôture':renderCloture};
  document.getElementById('app').innerHTML=`<header><div class="logo">🍺 Bar CHG</div><div style="display:flex;align-items:center;gap:6px"><span class="offline-badge ${navigator.onLine?'':'show'}">HORS LIGNE</span><div class="caisse-tags"><div class="caisse-tag off">Off: ${fmt(state.caisseOff)}</div><div class="caisse-tag noire">Noire: ${fmt(state.caisseNoire)}</div></div></div></header><nav>${TABS.map(t=>`<button class="${state.tab===t.id?'active':''}" onclick="update({tab:'${t.id}'})">${t.icon} ${t.id}</button>`).join('')}</nav><main>${tabs[state.tab]()}</main>${renderModal()}`;
}
render();
</script>
</body>
</html>
